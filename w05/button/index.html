<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="button" name="btnclk" id="btnclk" value="Click Me">
    <div id="result"></div>

    <script>
        class Mouse {
            handleEvent(event) {
                switch (event.type) {
                    case 'mousedown':
                        result.innerText = `Mouse down at (${event.clientX}, ${event.clientY})`;
                        break;
                    case 'mouseup':
                        result.innerText = `Mouse up at (${event.clientX}, ${event.clientY})`;
                        break;
                }
            }
        }
        let mouseHandler = new Mouse();
        btnclk.addEventListener('mousedown', mouseHandler);
        btnclk.addEventListener('mouseup', mouseHandler);
    </script>

</body>

</html>
